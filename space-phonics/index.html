<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Space Phonics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a2e;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game-canvas-holder { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- Outer shell: back-to-hub button ---- */
  #hub-btn {
    position: fixed; top: 14px; left: 14px; z-index: 20;
    font-family: 'Fredoka One', sans-serif;
    font-size: 18px; color: #0a0a2e;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    padding: 8px 16px;
    text-decoration: none;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #hub-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  /* ---- Loading screen ---- */
  #loading {
    position: fixed; inset: 0; z-index: 50;
    background: #0a0a2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    font-family: 'Fredoka One', sans-serif;
    transition: opacity 0.5s;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  #loading h1 {
    color: #ffd75e; font-size: clamp(28px, 6vw, 52px);
    text-shadow: 0 0 24px rgba(255, 215, 94, 0.5);
    letter-spacing: 2px;
  }
  #load-rocket { font-size: 56px; animation: bob 1.2s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-45deg); } 50% { transform: translateY(-14px) rotate(-45deg); } }
  #load-track {
    width: min(60vw, 420px); height: 26px;
    background: #1a1a4e;
    border: 3px solid #3a3a7e;
    border-radius: 14px;
    overflow: hidden;
  }
  #load-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #ff9d5c, #ffd75e);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #load-msg { color: #8888c8; font-size: 16px; }
</style>
</head>
<body>
  <div id="game-canvas-holder"></div>
  <a id="hub-btn" href="../index.html" title="Back to the hub">&#8962; Hub</a>

  <div id="loading">
    <div id="load-rocket">&#128640;</div>
    <h1>SPACE PHONICS</h1>
    <div id="load-track"><div id="load-bar"></div></div>
    <div id="load-msg">Fuelling the rocket&hellip;</div>
  </div>

  <!-- PixiJS v8 from CDN, with a vendored copy (v8.19.0) as offline fallback -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"
          onerror="var s=document.createElement('script');s.src='vendor/pixi.min.js';document.head.appendChild(s);"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>

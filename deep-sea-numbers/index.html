<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deep Sea Numbers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<meta name="theme-color" content="#5aa653">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #06294e;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game-canvas-holder { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- Outer shell: back-to-hub button ---- */
  #hub-btn {
    position: fixed; top: 14px; left: 14px; z-index: 20;
    font-family: 'Fredoka One', sans-serif;
    font-size: 18px; color: #06294e;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    padding: 8px 16px;
    text-decoration: none;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #hub-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  #fs-btn {
    position: fixed; top: 14px; right: 14px; z-index: 20;
    font-family: 'Fredoka One', sans-serif;
    font-size: 20px; color: #06294e;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    width: 46px; height: 44px;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #fs-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  #mute-btn {
    position: fixed; top: 14px; right: 70px; z-index: 20;
    font-size: 20px;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    width: 46px; height: 44px;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #mute-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  /* ---- Loading screen ---- */
  #loading {
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(180deg, #1583c0 0%, #06294e 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    font-family: 'Fredoka One', sans-serif;
    transition: opacity 0.5s;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  #loading h1 {
    color: #ffd75e; font-size: clamp(28px, 6vw, 52px);
    text-shadow: 0 0 24px rgba(255, 215, 94, 0.5);
    letter-spacing: 2px;
  }
  #load-sub { font-size: 56px; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
  #load-track {
    width: min(60vw, 420px); height: 26px;
    background: #0a3a66;
    border: 3px solid #2a6a9e;
    border-radius: 14px;
    overflow: hidden;
  }
  #load-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #4cc9f0, #ffd75e);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #load-msg { color: #8fc3e8; font-size: 16px; }
</style>
</head>
<body>
  <div id="game-canvas-holder"></div>
  <a id="hub-btn" href="../index.html" title="Back to the hub">&#8962; Hub</a>
  <button id="fs-btn" title="Full screen">&#x26F6;</button>
  <button id="mute-btn" title="Sound on/off">&#x1F50A;</button>
  <script>
    // Fullscreen + landscape lock: toggle button always available, and on
    // touch devices the first tap goes fullscreen automatically.
    (function () {
      async function goFS() {
        try {
          await document.documentElement.requestFullscreen();
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
          }
        } catch (e) { /* not supported / denied - fine */ }
      }
      document.getElementById('fs-btn').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else goFS();
      });
      if ('ontouchstart' in window) {
        window.addEventListener('pointerdown', () => {
          if (!document.fullscreenElement) goFS();
        }, { once: true });
      }
    })();
  </script>

  <div id="loading">
    <div id="load-sub">&#128031;</div>
    <h1>DEEP SEA NUMBERS</h1>
    <div id="load-track"><div id="load-bar"></div></div>
    <div id="load-msg">Filling the ballast tanks&hellip;</div>
  </div>

  <!-- PixiJS v8 from CDN, with a vendored copy as offline fallback -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"
          onerror="var s=document.createElement('script');s.src='../vendor/pixi.min.js';document.head.appendChild(s);"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>

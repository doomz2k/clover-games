<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Garden Maths</title>
<link href="../fonts/fonts.css" rel="stylesheet">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<meta name="theme-color" content="#5aa653">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #2e5d2a;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game-canvas-holder { position: fixed; inset: 0; }
  canvas { display: block; }

  #hub-btn {
    position: fixed; top: 14px; left: 14px; z-index: 20;
    font-family: 'Fredoka One', sans-serif;
    font-size: 18px; color: #2e3d1a;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    padding: 8px 16px;
    text-decoration: none;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #hub-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  #fs-btn {
    position: fixed; top: 14px; right: 14px; z-index: 20;
    font-family: 'Fredoka One', sans-serif;
    font-size: 20px; color: #2e3d1a;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    width: 46px; height: 44px;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #fs-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  #mute-btn {
    position: fixed; top: 14px; right: 70px; z-index: 20;
    font-size: 20px;
    background: #ffd75e;
    border: 3px solid #b8860b;
    border-radius: 14px;
    width: 46px; height: 44px;
    box-shadow: 0 4px 0 #b8860b;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #mute-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8860b; }

  #loading {
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(180deg, #ffd9e8 0%, #a8d8f0 45%, #4a7c3f 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    font-family: 'Fredoka One', sans-serif;
    transition: opacity 0.5s;
  }
  #loading.done { opacity: 0; pointer-events: none; transition: opacity 0.45s 0.15s; }
  /* payoff beat: the flower bursts to full bloom as loading completes */
  #loading.done #load-flower { animation: bloom 0.55s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
  @keyframes bloom { 100% { transform: scale(1.9) rotate(8deg); } }
  #loading h1 {
    color: #2e5d2a; font-size: clamp(28px, 6vw, 52px);
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }
  #load-flower { font-size: 56px; animation: grow 1.8s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes grow { 0%,100% { transform: scale(1) rotate(-3deg); } 50% { transform: scale(1.12) rotate(3deg); } }
  #load-track {
    width: min(60vw, 420px); height: 26px;
    background: #3a5c33;
    border: 3px solid #2e4d28;
    border-radius: 14px;
    overflow: hidden;
  }
  #load-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #7ac74f, #ffd75e);
    border-radius: 10px;
    transition: width 0.15s;
  }
  #load-msg { color: #2e4d28; font-size: 16px; }

  /* portrait devices: ask for landscape instead of squeezing the game */
  #rotate-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 60;
    background: rgba(6, 10, 30, 0.94);
    color: #ffd75e;
    font-family: 'Fredoka One', sans-serif;
    font-size: clamp(20px, 5vw, 32px);
    text-align: center;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 24px;
  }
  #rotate-phone { font-size: 64px; animation: turn 1.6s ease-in-out infinite; }
  @keyframes turn { 0%, 20% { transform: rotate(0); } 60%, 100% { transform: rotate(90deg); } }
  @media (orientation: portrait) { #rotate-overlay { display: flex; } }
</style>
</head>
<body>
  <div id="game-canvas-holder"></div>
  <div id="rotate-overlay">
    <div id="rotate-phone">&#128241;</div>
    <p>Please turn your device sideways!</p>
  </div>

  <a id="hub-btn" href="../index.html" title="Back to the hub">&#8962; Hub</a>
  <button id="fs-btn" title="Full screen">&#x26F6;</button>
  <button id="mute-btn" title="Sound on/off">&#x1F50A;</button>
  <script>
    // Fullscreen + landscape lock: toggle button always available, and on
    // touch devices the first tap goes fullscreen automatically.
    (function () {
      async function goFS() {
        try {
          await document.documentElement.requestFullscreen();
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
          }
        } catch (e) { /* not supported / denied - fine */ }
      }
      document.getElementById('fs-btn').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else goFS();
      });
      if ('ontouchstart' in window) {
        window.addEventListener('pointerdown', () => {
          if (!document.fullscreenElement) goFS();
        }, { once: true });
      }
    })();
  </script>

  <div id="loading">
    <div id="load-flower">&#127803;</div>
    <h1>GARDEN MATHS</h1>
    <div id="load-track"><div id="load-bar"></div></div>
    <div id="load-msg">Watering the seedlings&hellip;</div>
  </div>

  <!-- PixiJS v8 from CDN, with a vendored copy as offline fallback -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"
          onerror="var s=document.createElement('script');s.src='../vendor/pixi.min.js';document.head.appendChild(s);"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    // Offline support (root service worker, scoped to the whole site)
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
  </script>
</body>
</html>

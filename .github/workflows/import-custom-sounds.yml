name: Import custom sounds

# Runs automatically when audio files are uploaded to voices/custom/
# (and on demand). Installs them over the live phonic clips and deploys.

on:
  push:
    branches: [main]
    paths: ['voices/custom/**']
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: custom-sounds
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Import custom sounds
        run: python3 tools/import_custom_sounds.py

      - name: Commit
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add voices
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Install custom phonic sound recordings"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy-pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

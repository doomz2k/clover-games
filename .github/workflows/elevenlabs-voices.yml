name: Generate voices (ElevenLabs)

# Renders all narrator + character lines with your ElevenLabs voice and
# commits the clips. Phonic sounds keep their Sound Lab picks; an
# 'elevenlabs' candidate for each sound is added to the lab to audition.
#
# One-time setup in repo Settings -> Secrets and variables -> Actions:
#   secret   ELEVENLABS_API_KEY   your API key (never goes in the repo)
#   variable ELEVENLABS_VOICE_ID  the voice to use (from your VoiceLab)
#
# A full render is ~75k characters of quota; re-runs without "force" only
# render missing lines.

on:
  workflow_dispatch:
    inputs:
      force:
        description: Re-render clips that already exist (full quota spend)
        type: boolean
        default: false
      sound_lab:
        description: Also render lab candidates for the phonic sounds
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Build manifest
        run: node tools/gen-voice-manifest.mjs

      - name: Render with ElevenLabs
        run: >
          python3 tools/render_voices_elevenlabs.py
          ${{ inputs.force && '--force' || '' }}
          ${{ inputs.sound_lab && '--sound-lab' || '' }}
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID || secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL: ${{ vars.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}

      - name: Re-apply operator sound picks
        run: python3 tools/apply_sound_choices.py

      - name: Commit voices
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add voices
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Generate narration voice clips (ElevenLabs)"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy-pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

name: Generate voice clips

# Renders every narration line to voices/*.ogg with Piper (neural TTS) and
# commits the result. Run manually from the Actions tab whenever the games'
# spoken lines change. The games fall back to browser speech for any line
# that has no clip, so this can never break the site.

on:
  workflow_dispatch:
    inputs:
      force:
        description: Re-render clips that already exist
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Piper + ffmpeg
        run: |
          pip install piper-tts
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Download voice model
        run: python -m piper.download_voices en_GB-northern_english_male-medium

      - name: Build manifest
        run: node tools/gen-voice-manifest.mjs

      - name: Render clips
        run: python tools/render_voices.py ${{ inputs.force && '--force' || '' }}
        env:
          PIPER_VOICE: en_GB-northern_english_male-medium.onnx

      - name: Commit voices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add voices
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Generate narration voice clips (Piper en_GB male)"
          git push

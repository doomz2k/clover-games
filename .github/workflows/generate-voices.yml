name: Generate voice clips

# Renders every narration line to voices/*.ogg with Piper (neural TTS) and
# commits the result. Run manually from the Actions tab whenever the games'
# spoken lines change. The games fall back to browser speech for any line
# that has no clip, so this can never break the site.

on:
  workflow_dispatch:
    inputs:
      force:
        description: Re-render clips that already exist
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Piper + ffmpeg
        run: |
          pip install piper-tts
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Download voice model
        run: python -m piper.download_voices en_GB-cori-high

      - name: Build manifest
        run: node tools/gen-voice-manifest.mjs

      - name: Render clips
        run: python tools/render_voices.py ${{ inputs.force && '--force' || '' }}
        env:
          PIPER_VOICE: en_GB-cori-high.onnx

      # Isolated phonic sounds use real human phoneme recordings (Wikimedia
      # Commons) instead of TTS - always overwrites its subset of clips.
      - name: Fetch phoneme recordings
        run: python tools/fetch_phoneme_clips.py

      - name: Commit voices
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add voices
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Generate narration voice clips (Piper en_GB female)"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with GITHUB_TOKEN don't trigger the on:push deploy
      # (GitHub's recursion guard), so kick the Pages deploy explicitly.
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy-pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
